name: "Update Catalog JSON Indices"

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  catalog-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Catalog Indices
        run: |
          echo "Running TrueNAS catalog generator..."
          docker run --rm \
            -v ${{ github.workspace }}:/catalog \
            --entrypoint /bin/sh \
            ixsystems/catalog_validation:latest \
            -c "git config --global --add safe.directory /catalog && catalog_update update --path /catalog"

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json "*/app_versions.json"
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-generate catalog.json and app_versions.json [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
